experiment:
  name: unet
  output_dir: outputs/runs

seed: 42

data:
  dataset_name: dpelacani/mri-t1-t2-2D-sliced-64
  train_split: train
  val_split: validation
  input_key: t1
  target_key: t2
  metadata_keys: [view, patient_id]
  normalization:
    method: global_minmax
    sample_step: 10
    lower_percentile: 1.0
    upper_percentile: 99.0

loader:
  batch_size: 64
  num_workers: 4
  pin_memory: true

model:
  name: unet

training:
  epochs: 50
  lr: 0.0003
  loss: mse
  device: auto
  use_amp: true
  compile_model: true

scheduler:
  name: reduce_on_plateau
  mode: min
  factor: 0.5
  patience: 4
  min_lr: 1.0e-6

early_stopping:
  enabled: true
  patience: 12
  min_delta: 1.0e-5
  monitor: val_loss

evaluation:
  metrics: [mse, mae, rmse, psnr, ssim]
  num_visual_samples: 8
  max_batches:
